<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cortex  Deliberate AI practice for developers">
  <defs>
    <radialGradient id="emberA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F16001" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#C10801" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3C9A6" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#E3C9A6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C10801" stop-opacity="0.42"/>
      <stop offset="65%" stop-color="#C10801" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(45)">
      <stop offset="0%" stop-color="#E3C9A6"/>
      <stop offset="50%" stop-color="#F16001"/>
      <stop offset="100%" stop-color="#C10801"/>
    </linearGradient>
    <linearGradient id="headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3C9A6"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F16001" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F16001" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1600" height="520" fill="#000000"/>

  <!-- Ambient glows -->
  <circle cx="240" cy="380" r="420" fill="url(#emberA)"/>
  <circle cx="1280" cy="140" r="360" fill="url(#emberA)"/>
  <circle cx="820" cy="260" r="380" fill="url(#emberB)"/>
  <circle cx="1440" cy="440" r="300" fill="url(#emberC)"/>

  <!-- Top-left status chip -->
  <g transform="translate(120, 88)">
    <rect width="190" height="30" rx="15" fill="#121212" stroke="#333333" stroke-width="1"/>
    <circle cx="16" cy="15" r="3.5" fill="#F16001"/>
    <text x="28" y="19" fill="#A7A7A7" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="11" letter-spacing="2.2">AI-NATIVE  ·  v0.1.0</text>
  </g>

  <!-- Ring logo (CortexLoader motif) -->
  <g transform="translate(188, 268)">
    <g transform="rotate(-45)">
      <circle r="60" fill="none" stroke="url(#ring)" stroke-width="1.4" stroke-dasharray="340 40" stroke-linecap="round"/>
    </g>
    <g transform="rotate(25)">
      <circle r="46" fill="none" stroke="url(#ring)" stroke-width="1.6" stroke-dasharray="255 30" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-15)">
      <circle r="32" fill="none" stroke="url(#ring)" stroke-width="1.6" stroke-dasharray="175 25" stroke-linecap="round"/>
    </g>
    <circle r="5" fill="#F16001"/>
  </g>

  <!-- Wordmark -->
  <text x="290" y="298" fill="url(#headline)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="148" font-weight="800" letter-spacing="-4">CORTEX</text>

  <!-- Tagline -->
  <text x="292" y="346" fill="#A7A7A7" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="22" font-weight="400">
    Deliberate AI practice for developers  missions, a live editor, and honest feedback in one loop.
  </text>

  <!-- Tech chips -->
  <g transform="translate(292, 384)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="12" font-weight="500">
    <g>
      <rect width="108" height="28" rx="14" fill="#121212" stroke="#333333"/>
      <text x="16" y="18" fill="#F9F9F9">Next.js 16</text>
      <circle cx="95" cy="14" r="3" fill="#F16001"/>
    </g>
    <g transform="translate(118, 0)">
      <rect width="100" height="28" rx="14" fill="#121212" stroke="#333333"/>
      <text x="16" y="18" fill="#F9F9F9">React 19</text>
      <circle cx="87" cy="14" r="3" fill="#F16001"/>
    </g>
    <g transform="translate(228, 0)">
      <rect width="120" height="28" rx="14" fill="#121212" stroke="#333333"/>
      <text x="16" y="18" fill="#F9F9F9">OpenAI API</text>
      <circle cx="107" cy="14" r="3" fill="#F16001"/>
    </g>
    <g transform="translate(358, 0)">
      <rect width="95" height="28" rx="14" fill="#121212" stroke="#333333"/>
      <text x="16" y="18" fill="#F9F9F9">Monaco</text>
      <circle cx="82" cy="14" r="3" fill="#F16001"/>
    </g>
    <g transform="translate(463, 0)">
      <rect width="108" height="28" rx="14" fill="#121212" stroke="#333333"/>
      <text x="16" y="18" fill="#F9F9F9">Tailwind 4</text>
      <circle cx="95" cy="14" r="3" fill="#F16001"/>
    </g>
  </g>

  <!-- Right-side mini code card -->
  <g transform="translate(1020, 130)">
    <rect width="440" height="260" rx="20" fill="#0a0a0a" stroke="#333333"/>
    <rect x="1" y="1" width="438" height="40" rx="19" fill="#121212"/>
    <rect x="1" y="28" width="438" height="13" fill="#121212"/>
    <circle cx="22" cy="21" r="5" fill="#C10801"/>
    <circle cx="40" cy="21" r="5" fill="#F16001"/>
    <circle cx="58" cy="21" r="5" fill="#E3C9A6"/>
    <text x="88" y="25" fill="#A7A7A7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">challenge.js</text>
    <g transform="translate(354, 14)">
      <rect width="76" height="18" rx="9" fill="#1a0d05" stroke="#F16001" stroke-opacity="0.3"/>
      <text x="10" y="12" fill="#F16001" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" letter-spacing="1">AI · LIVE</text>
    </g>

    <g transform="translate(24, 84)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text y="0" fill="#A7A7A7"><tspan fill="#E3C9A6">function </tspan><tspan fill="#F9F9F9">sumEvenNumbers</tspan>(arr) {</text>
      <text y="22" fill="#A7A7A7">  <tspan fill="#E3C9A6">let</tspan> <tspan fill="#F9F9F9">total</tspan> = 0;</text>
      <text y="44" fill="#A7A7A7">  <tspan fill="#E3C9A6">for</tspan> (<tspan fill="#E3C9A6">const</tspan> n <tspan fill="#E3C9A6">of</tspan> arr) {</text>
      <text y="66" fill="#A7A7A7">    <tspan fill="#E3C9A6">if</tspan> (n % 2 === 0) total += n;</text>
      <text y="88" fill="#A7A7A7">  }</text>
      <text y="110" fill="#A7A7A7">  <tspan fill="#E3C9A6">return</tspan> total;</text>
      <text y="132" fill="#A7A7A7">}</text>
    </g>

    <g transform="translate(24, 214)">
      <rect width="392" height="32" rx="10" fill="#0f0f0f" stroke="#333333"/>
      <circle cx="18" cy="16" r="5" fill="#F16001"/>
      <text x="34" y="20" fill="#F9F9F9" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12">Clean, idiomatic  ·  Quality 94 / 100</text>
      <circle cx="370" cy="16" r="4" fill="none" stroke="#F16001" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Bottom accent rule -->
  <rect x="120" y="462" width="1360" height="1" fill="#222222"/>
  <rect x="120" y="462" width="240" height="1" fill="url(#rule)"/>
</svg>

      <text x="62" y="62" fill="#646464" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11">/ 100</text>
      <rect x="16" y="74" width="120" height="6" rx="3" fill="#1a1a1a"/>
      <rect x="16" y="74" width="110" height="6" rx="3" fill="url(#scoreBlue)"/>
      <text x="16" y="96" fill="#646464" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="10">Guarded input, safe types.</text>

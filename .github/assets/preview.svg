    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#646464" text-anchor="end">
      <text x="38" y="74">1</text>
      <text x="38" y="98">2</text>
      <text x="38" y="122">3</text>
      <text x="38" y="146">4</text>
      <text x="38" y="170">5</text>
      <text x="38" y="194">6</text>
      <text x="38" y="218">7</text>
      <text x="38" y="242">8</text>
      <text x="38" y="266">9</text>
      <text x="38" y="290">10</text>
      <text x="38" y="314">11</text>
      <text x="38" y="338">12</text>
    </g>

    <g transform="translate(64, 72)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text y="0" fill="#A7A7A7"><tspan fill="#E3C9A6">function </tspan><tspan fill="#F9F9F9">sumEvenNumbers</tspan>(arr) {</text>
      <text y="24" fill="#A7A7A7">  <tspan fill="#E3C9A6">if</tspan> (!<tspan fill="#38bdf8">Array</tspan>.isArray(arr)) <tspan fill="#E3C9A6">return</tspan> 0;</text>
      <text y="48" fill="#A7A7A7">  </text>
      <text y="72" fill="#A7A7A7">  <tspan fill="#E3C9A6">let</tspan> <tspan fill="#F9F9F9">total</tspan> = 0;</text>
      <text y="96" fill="#A7A7A7">  <tspan fill="#E3C9A6">for</tspan> (<tspan fill="#E3C9A6">const</tspan> n <tspan fill="#E3C9A6">of</tspan> arr) {</text>
      <text y="120" fill="#A7A7A7">    <tspan fill="#E3C9A6">if</tspan> (<tspan fill="#E3C9A6">typeof</tspan> n !== <tspan fill="#22c55e">"number"</tspan>) <tspan fill="#E3C9A6">continue</tspan>;</text>
      <text y="144" fill="#A7A7A7">    <tspan fill="#E3C9A6">if</tspan> (n % 2 === 0) total += n;</text>
      <text y="168" fill="#A7A7A7">  }</text>
      <text y="192" fill="#A7A7A7">  </text>
      <text y="216" fill="#A7A7A7">  <tspan fill="#E3C9A6">return</tspan> total;</text>
      <text y="240" fill="#A7A7A7">}</text>
      <text y="288" fill="#A7A7A7"><tspan fill="#646464">// Runs in-browser via new Function; Python/Rust via Piston</tspan></text>
    </g>

    <rect x="1" y="348" width="818" height="99" rx="0" fill="#060606"/>
    <rect x="1" y="348" width="818" height="26" fill="#0a0a0a"/>

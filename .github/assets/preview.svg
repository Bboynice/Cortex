      <g transform="translate(20, 18)">
        <text fill="#F9F9F9" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Mixed types slip through</text>
        <text y="22" fill="#A7A7A7" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11">typeof check skips non-numbers but floats still qualify as even.</text>
